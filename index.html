<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Sphere Parts - Modern Shop</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #533483 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            color: #ffffff;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .glass-card {
            background: rgba(15, 15, 35, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        
        .glass-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            background: rgba(15, 15, 35, 0.8);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .glass-button {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        .glass-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .glass-button:hover::before {
            left: 100%;
        }
        
        .glass-button:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.1) 100%);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .car-card {
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.7) 0%, rgba(26, 26, 46, 0.5) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .car-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .car-card:hover::before {
            left: 100%;
        }
        
        .car-card:hover {
            transform: translateY(-16px) scale(1.08);
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.5),
                0 0 0 2px rgba(255, 255, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.25);
        }
        
        .part-item {
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.6) 0%, rgba(26, 26, 46, 0.4) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        
        .part-item.selected {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(34, 197, 94, 0.1) 100%);
            border-color: rgba(34, 197, 94, 0.6);
            box-shadow: 
                0 0 30px rgba(34, 197, 94, 0.4),
                0 0 0 2px rgba(34, 197, 94, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.7) 0%, rgba(26, 26, 46, 0.5) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .stat-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .slide-in {
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { 
                opacity: 0;
                transform: translateX(100%);
            }
            to { 
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from { 
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to { 
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        
        .shimmer::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.15),
                transparent
            );
            animation: shimmer 4s infinite;
        }
        
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [selectedCar, setSelectedCar] = useState('');
            const [selectedParts, setSelectedParts] = useState([]);
            const [showDashboard, setShowDashboard] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [mounted, setMounted] = useState(false);
            const [hoveredCar, setHoveredCar] = useState('');
            const [hoveredPart, setHoveredPart] = useState('');
            const [animatingParts, setAnimatingParts] = useState(new Set());

            useEffect(() => {
                setMounted(true);
            }, []);

            const cars = {
                toyota: {
                    name: 'Toyota',
                    models: ['Corolla', 'Camry', 'Prius', 'Hilux'],
                    icon: 'fa-car',
                    color: '#dc2626'
                },
                honda: {
                    name: 'Honda',
                    models: ['Civic', 'Accord', 'CR-V', 'City'],
                    icon: 'fa-car-side',
                    color: '#059669'
                },
                bmw: {
                    name: 'BMW',
                    models: ['3 Series', '5 Series', 'X5', 'X3'],
                    icon: 'fa-car-burst',
                    color: '#2563eb'
                },
                mercedes: {
                    name: 'Mercedes',
                    models: ['C-Class', 'E-Class', 'G-Wagon', 'S-Class'],
                    icon: 'fa-car-on',
                    color: '#7c3aed'
                },
                audi: {
                    name: 'Audi',
                    models: ['A4', 'A6', 'Q7', 'Q5'],
                    icon: 'fa-car-tunnel',
                    color: '#ea580c'
                },
                suzuki: {
                    name: 'Suzuki',
                    models: ['Alto', 'Cultus', 'Swift', 'Mehran'],
                    icon: 'fa-car',
                    color: '#0891b2'
                }
            };

            const parts = [
                { name: 'Engine', price: 75000, icon: 'fa-cogs', description: 'Complete engine assembly', color: '#dc2626' },
                { name: 'Transmission', price: 55000, icon: 'fa-gear', description: 'Automatic/Manual transmission', color: '#2563eb' },
                { name: 'Brakes', price: 12000, icon: 'fa-circle-stop', description: 'Brake pads, discs, calipers', color: '#059669' },
                { name: 'Suspension', price: 25000, icon: 'fa-compress', description: 'Shock absorbers, springs', color: '#7c3aed' },
                { name: 'Electrical', price: 18000, icon: 'fa-bolt', description: 'Wiring, sensors, lights', color: '#eab308' },
                { name: 'Body Parts', price: 35000, icon: 'fa-panels', description: 'Doors, fenders, bumpers', color: '#ea580c' },
                { name: 'Battery', price: 8500, icon: 'fa-battery-full', description: 'Car battery and accessories', color: '#0891b2' },
                { name: 'Tires', price: 15000, icon: 'fa-circle', description: 'All season tires', color: '#64748b' },
                { name: 'Engine Oil', price: 3500, icon: 'fa-oil-can', description: 'Premium synthetic engine oil', color: '#84cc16' }
            ];

            const filteredParts = parts.filter(part =>
                part.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const togglePart = (partName) => {
                setAnimatingParts(new Set([partName]));
                setTimeout(() => setAnimatingParts(new Set()), 600);
                
                setSelectedParts(prev => 
                    prev.includes(partName) 
                        ? prev.filter(p => p !== partName)
                        : [...prev, partName]
                );
            };

            const getTotalPrice = () => {
                return selectedParts.reduce((total, partName) => {
                    const part = parts.find(p => p.name === partName);
                    return total + (part ? part.price : 0);
                }, 0);
            };

            const selectedCarData = selectedCar ? cars[selectedCar] : null;

            return (
                <div className={`min-h-screen bg-gradient-to-br from-purple-600 via-blue-600 to-pink-500 transition-all duration-1000 ${mounted ? 'opacity-100' : 'opacity-0'}`}>
                    {/* Header */}
                    <header className={`glass-card sticky top-0 z-50 mx-4 mt-4 p-4 transition-all duration-700 ${mounted ? 'translate-y-0 opacity-100' : '-translate-y-full opacity-0'}`}>
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <i className="fas fa-car text-3xl text-white animate-pulse"></i>
                                <h1 className="text-2xl font-bold text-white bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent">Car Sphere Parts</h1>
                            </div>
                            <button 
                                onClick={() => setShowDashboard(!showDashboard)}
                                className="glass-button px-6 py-2 rounded-lg text-white flex items-center gap-2 hover:scale-105 transition-transform duration-300"
                            >
                                <i className="fas fa-chart-line"></i>
                                Dashboard
                            </button>
                        </div>
                    </header>

                    {!showDashboard ? (
                        <div className="max-w-7xl mx-auto p-4">
                            {/* Car Selection */}
                            <div className={`mb-12 transition-all duration-1000 ${mounted ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                                <h2 className="text-3xl font-bold text-white text-center mb-8 animate-pulse">
                                    Select Your Car Brand
                                </h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
                                    {Object.entries(cars).map(([key, car]) => (
                                        <button
                                            key={key}
                                            onClick={() => setSelectedCar(key)}
                                            onMouseEnter={() => setHoveredCar(key)}
                                            onMouseLeave={() => setHoveredCar('')}
                                            className={`car-card p-8 text-center transition-all duration-500 ${
                                                selectedCar === key ? 'ring-4 ring-white ring-opacity-30 scale-105' : ''
                                            } ${
                                                hoveredCar === key ? 'scale-110 shadow-2xl' : ''
                                            } ${
                                                mounted ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'
                                            }`}
                                            style={{
                                                borderColor: selectedCar === key ? car.color : 'rgba(255, 255, 255, 0.2)',
                                                borderWidth: selectedCar === key ? '3px' : '1px',
                                                transitionDelay: `${Object.keys(cars).indexOf(key) * 100}ms`
                                            }}
                                        >
                                            <i 
                                                className={`fas ${car.icon} text-4xl mb-3 transition-transform duration-300 ${
                                                    hoveredCar === key ? 'scale-125 rotate-12' : ''
                                                }`}
                                                style={{ color: car.color }}
                                            ></i>
                                            <h3 className="text-white font-semibold">{car.name}</h3>
                                            <div className="flex flex-wrap gap-1 mt-2 justify-center">
                                                {car.models.slice(0, 2).map(model => (
                                                    <span key={model} className="text-xs text-gray-300">
                                                        {model}
                                                    </span>
                                                ))}
                                            </div>
                                            {hoveredCar === key && (
                                                <div className="absolute inset-0 rounded-24 bg-gradient-to-t from-white/10 to-transparent pointer-events-none"></div>
                                            )}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Parts Selection */}
                            {selectedCar && (
                                <div className={`transition-all duration-700 ${mounted ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                                    <div className="glass-card p-6 mb-8">
                                        <div className="flex items-center gap-3 mb-6">
                                            <i 
                                                className={`fas ${selectedCarData.icon} text-2xl`}
                                                style={{ color: selectedCarData.color }}
                                            ></i>
                                            <h2 className="text-2xl font-bold text-white">
                                                {selectedCarData.name} Parts Selection
                                            </h2>
                                        </div>

                                        {/* Search Bar */}
                                        <div className="max-w-md mx-auto mb-8">
                                            <div className="relative">
                                                <input
                                                    type="text"
                                                    placeholder="Search parts..."
                                                    value={searchTerm}
                                                    onChange={(e) => setSearchTerm(e.target.value)}
                                                    className="w-full px-4 py-3 pr-10 rounded-lg bg-white bg-opacity-20 backdrop-blur-md text-white placeholder-gray-300 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-50"
                                                />
                                                <i className="fas fa-search absolute right-3 top-1/2 transform -translate-y-1/2 text-white"></i>
                                            </div>
                                        </div>

                                        {/* Parts Grid */}
                                        <div className="grid grid-cols-1 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                            {filteredParts.map((part) => (
                                                <button
                                                    key={part.name}
                                                    onClick={() => togglePart(part.name)}
                                                    onMouseEnter={() => setHoveredPart(part.name)}
                                                    onMouseLeave={() => setHoveredPart('')}
                                                    className={`part-item p-6 rounded-2xl text-left transition-all duration-500 shimmer relative overflow-hidden ${
                                                        selectedParts.includes(part.name) ? 'selected' : ''
                                                    } ${
                                                        hoveredPart === part.name ? 'scale-105 shadow-2xl' : ''
                                                    } ${
                                                        animatingParts.has(part.name) ? 'animate-bounce' : ''
                                                    }`}
                                                    style={{
                                                        transitionDelay: `${filteredParts.indexOf(part) * 50}ms`
                                                    }}
                                                >
                                                    <div className="flex items-start gap-3">
                                                        <div 
                                                            className={`w-12 h-12 rounded-lg flex items-center justify-center flex-shrink-0 transition-all duration-300 ${
                                                                hoveredPart === part.name ? 'scale-125 rotate-12' : ''
                                                            }`}
                                                            style={{ background: `linear-gradient(135deg, ${part.color}20, ${part.color}40)` }}
                                                        >
                                                            <i 
                                                                className={`${part.icon} text-xl transition-transform duration-300 ${
                                                                    hoveredPart === part.name ? 'scale-125' : ''
                                                                }`}
                                                                style={{ color: part.color }}
                                                            ></i>
                                                        </div>
                                                        <div className="flex-1">
                                                            <h4 className={`text-white font-semibold text-lg transition-all duration-300 ${
                                                                hoveredPart === part.name ? 'text-xl' : ''
                                                            }`}>{part.name}</h4>
                                                            <p className="text-gray-300 text-sm mb-2">{part.description}</p>
                                                            <div className="flex items-center gap-2">
                                                                <p className={`text-green-400 font-bold transition-all duration-300 ${
                                                                    hoveredPart === part.name ? 'text-xl' : 'text-lg'
                                                                }`}>Rs.{part.price.toLocaleString()}</p>
                                                                {part.name === 'Engine Oil' && (
                                                                    <span className="bg-yellow-500 text-yellow-900 text-xs px-2 py-1 rounded-full font-semibold animate-pulse">
                                                                        BEST SELLER
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </div>
                                                        {selectedParts.includes(part.name) && (
                                                            <div className="flex flex-col items-center animate-pulse">
                                                                <i className="fas fa-check-circle text-green-400 text-xl mb-1"></i>
                                                                <span className="text-green-400 text-xs font-semibold">SELECTED</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    {hoveredPart === part.name && (
                                                        <div className="absolute inset-0 rounded-xl bg-gradient-to-t from-white/5 to-transparent pointer-events-none"></div>
                                                    )}
                                                </button>
                                            ))}
                                        </div>

                                        {/* Selected Parts Summary */}
                                        {selectedParts.length > 0 && (
                                            <div className="mt-8 p-4 bg-white bg-opacity-10 rounded-lg">
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <p className="text-white font-semibold">
                                                            {selectedParts.length} parts selected
                                                        </p>
                                                        <p className="text-gray-300 text-sm">
                                                            {selectedParts.join(', ')}
                                                        </p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-2xl font-bold text-green-400">
                                                            Rs.{getTotalPrice().toLocaleString()}
                                                        </p>
                                                        <p className="text-gray-300 text-sm">Total Price</p>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    ) : (
                        /* Personal Dashboard */
                        <div className="max-w-6xl mx-auto p-4 slide-in">
                            <div className="glass-card p-8">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-3xl font-bold text-white">Personal Dashboard</h2>
                                    <button 
                                        onClick={() => setShowDashboard(false)}
                                        className="text-white hover:text-red-400 transition text-2xl"
                                    >
                                        <i className="fas fa-times"></i>
                                    </button>
                                </div>

                                {/* Stats Grid */}
                                <div className="stats-grid mb-8">
                                    <div className="stat-card">
                                        <div className="flex items-center gap-3 mb-2">
                                            <i className="fas fa-car text-2xl text-blue-400"></i>
                                            <span className="text-2xl font-bold text-white">
                                                {selectedCar ? selectedCarData.name : 'Not Selected'}
                                            </span>
                                        </div>
                                        <p className="text-gray-300">Selected Car</p>
                                    </div>

                                    <div className="stat-card">
                                        <div className="flex items-center gap-3 mb-2">
                                            <i className="fas fa-cogs text-2xl text-green-400"></i>
                                            <span className="text-2xl font-bold text-white">{selectedParts.length}</span>
                                        </div>
                                        <p className="text-gray-300">Selected Parts</p>
                                    </div>

                                    <div className="stat-card">
                                        <div className="flex items-center gap-3 mb-2">
                                            <i className="fas fa-money-bill-wave text-2xl text-yellow-400"></i>
                                            <span className="text-2xl font-bold text-white">
                                                Rs.{getTotalPrice().toLocaleString()}
                                            </span>
                                        </div>
                                        <p className="text-gray-300">Total Price</p>
                                    </div>

                                    <div className="stat-card">
                                        <div className="flex items-center gap-3 mb-2">
                                            <i className="fas fa-percentage text-2xl text-purple-400"></i>
                                            <span className="text-2xl font-bold text-white">15%</span>
                                        </div>
                                        <p className="text-gray-300">Discount Available</p>
                                    </div>
                                </div>

                                {/* Selected Parts Details */}
                                {selectedParts.length > 0 && (
                                    <div className="glass-card p-6">
                                        <h3 className="text-xl font-bold text-white mb-4">Selected Parts Details</h3>
                                        <div className="space-y-3">
                                            {selectedParts.map(partName => {
                                                const part = parts.find(p => p.name === partName);
                                                return (
                                                    <div key={partName} className="flex justify-between items-center p-3 bg-white bg-opacity-10 rounded-lg">
                                                        <div className="flex items-center gap-3">
                                                            <i className={`${part.icon} text-white`}></i>
                                                            <span className="text-white">{part.name}</span>
                                                        </div>
                                                        <span className="text-green-400 font-bold">
                                                            Rs.{part.price.toLocaleString()}
                                                        </span>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        <div className="mt-6 pt-6 border-t border-white border-opacity-20">
                                            <div className="flex justify-between items-center">
                                                <span className="text-xl font-bold text-white">Total Amount:</span>
                                                <span className="text-2xl font-bold text-green-400">
                                                    Rs.{getTotalPrice().toLocaleString()}
                                                </span>
                                            </div>
                                            <button className="w-full mt-4 glass-button py-3 rounded-lg text-white font-semibold hover:bg-green-500 hover:bg-opacity-30 transition">
                                                <i className="fas fa-shopping-cart mr-2"></i>
                                                Proceed to Checkout
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {selectedParts.length === 0 && (
                                    <div className="text-center py-12">
                                        <i className="fas fa-box-open text-6xl text-gray-400 mb-4"></i>
                                        <p className="text-gray-300 text-lg">No parts selected yet</p>
                                        <button 
                                            onClick={() => setShowDashboard(false)}
                                            className="mt-4 glass-button px-6 py-2 rounded-lg text-white"
                                        >
                                            Select Parts
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic HTML meta tags for proper rendering and SEO -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR AUTO STORE</title>
    <!-- Tailwind CSS CDN for styling - yeh humare saare CSS classes provide karta hai -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>
</head>
<!-- Body mein basic styling set ki - black background, white text, no scrollbars -->
<body class="m-0 p-0 box-border overflow-x-hidden bg-black text-white">
    
    <!-- Background Image Section -->
    <!-- Fixed position mein hai taaki scroll karne pe bhi background rahe -->
    <!-- -z-10 z-index hai taaki content iske upar show ho -->
    <div class="fixed inset-0 w-full h-screen bg-cover bg-center bg-no-repeat -z-10" style="background-image: url('pic/hero-car.jpg')"></div>
    
    <!-- Navigation Bar -->
    <!-- Gradient background with blur effect for modern look -->
    <nav class="bg-gradient-to-r from-gray-900 via-gray-800 to-black text-white p-4 relative z-10 backdrop-blur-lg bg-opacity-90 border-b border-gray-700">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            
            <!-- Left Side - Logo -->
            <!-- Gradient text effect with hover animations -->
            <div class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-600 bg-clip-text text-transparent hover:from-blue-500 hover:to-purple-700 transition-all duration-300 transform hover:scale-105">
                AR-AUTO-STORE
            </div>
            
            <!-- Center - Navigation Links -->
            <!-- Flex layout mein links with hover effects and underline animation -->
            <div class="hidden md:flex space-x-8">
                <!-- Desktop menu -->
                <a href="index.html" class="text-white hover:text-blue-400 transition-all duration-300 font-semibold hover:scale-110 relative group no-underline transform hover:-translate-y-1 hover:shadow-lg hover:shadow-blue-500/50">
                    HOME
                    <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-blue-400 transition-all duration-300 group-hover:w-full"></span>
                </a>
                <a href="#" class="text-white hover:text-blue-400 transition-all duration-300 font-semibold hover:scale-110 relative group no-underline transform hover:-translate-y-1 hover:shadow-lg hover:shadow-blue-500/50">
                    ABOUT
                    <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-blue-400 transition-all duration-300 group-hover:w-full"></span>
                </a>
                <a href="product.html" class="text-white hover:text-blue-400 transition-all duration-300 font-semibold hover:scale-110 relative group no-underline transform hover:-translate-y-1 hover:shadow-lg hover:shadow-blue-500/50">
                    PRODUCTS
                    <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-blue-400 transition-all duration-300 group-hover:w-full"></span>
                </a>
            </div>
            
            <!-- Right Side - Search Bar -->
            <!-- Glassmorphism effect with backdrop blur -->
            <div class="relative">
                <input type="text" placeholder="Search..." class="bg-gray-700 bg-opacity-50 backdrop-blur-md text-white px-4 py-2 rounded-full pr-10 border border-gray-600 focus:border-blue-400 focus:outline-none transition-all duration-300 placeholder-gray-400" onkeyup="performSearch(this.value)" oninput="performSearch(this.value)">
                <!-- Search icon button inside input -->
                <button class="absolute right-2 top-1/2 transform -translate-y-1/2 text-blue-400 hover:text-blue-300 transition-colors">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main Content Area -->
    <main class="relative z-10">
        <!-- Hero Section with Car Image -->
        <!-- 70vh height set kiya as requested -->
        <section class="h-screen relative flex items-center justify-center" style="height: 70vh;">
            <!-- Car Hero Image -->
            <img src="pic/car hero.jpeg" alt="Car Hero Image" class="w-full h-full object-cover">
            
            <!-- Dark Overlay for text readability -->
            <!-- Black overlay with 50% opacity -->
            <div class="absolute inset-0 bg-black bg-opacity-50"></div>
            
            <!-- Text Content Overlay -->
            <!-- Absolute positioning for center alignment -->
            <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-4">
                <!-- Main Heading -->
                <!-- Responsive text size - mobile pe 5xl, desktop pe 7xl -->
                <h1 class="text-5xl md:text-7xl font-bold text-white mb-4">AR-AUTO-STORE</h1>
                
                <!-- Subtext/Tagline -->
                <!-- Light gray color for subtle look -->
                <p class="text-xl md:text-2xl text-gray-200 mb-8">Quality parts for every ride</p>
                
                <!-- Call to Action Button -->
                <!-- Gradient background with hover effects -->
                <button onclick="exploreProducts()" class="bg-gradient-to-r from-blue-500 to-purple-600 text-white px-8 py-3 rounded-full font-semibold text-lg hover:from-blue-600 hover:to-purple-700 transform hover:scale-105 transition-all duration-300 shadow-lg hover:shadow-xl">
                    Explore Now
                </button>
            </div>
        </section>
        
        <!-- Search Results Section -->
        <section id="search-results" class="max-w-4xl mx-auto px-4 mt-8 hidden">
            <div class="bg-gray-900 bg-opacity-80 backdrop-blur-md rounded-2xl p-6 border border-gray-700">
                <h2 class="text-2xl font-bold text-white mb-6">Search Results</h2>
                <div id="search-items" class="space-y-3">
                    <!-- Search results will appear here -->
                </div>
            </div>
        </section>
        
        <!-- Shopping Cart Section -->
        <section class="max-w-4xl mx-auto px-4 mt-8">
            <div class="bg-gray-900 bg-opacity-80 backdrop-blur-md rounded-2xl p-6 border border-gray-700">
                <h2 class="text-2xl font-bold text-white mb-6">Shopping Cart</h2>
                <div id="cart-items" class="space-y-3 mb-6">
                    <p class="text-gray-400">No items selected</p>
                </div>
                <div class="flex justify-between items-center">
                    <div>
                        <span class="text-gray-300">Total Amount:</span>
                        <span id="total-amount" class="text-3xl font-bold text-blue-400 ml-2">$0.00</span>
                    </div>
                    <div class="space-x-4">
                        <button onclick="confirmOrder()" class="bg-green-600 text-white px-6 py-3 rounded-full font-semibold hover:bg-green-700 transition-all duration-300 transform hover:scale-105">
                            Confirm Order
                        </button>
                        <button onclick="openWhatsApp()" class="bg-blue-600 text-white px-6 py-3 rounded-full font-semibold hover:bg-blue-700 transition-all duration-300 transform hover:scale-105">
                            Contact Us
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
